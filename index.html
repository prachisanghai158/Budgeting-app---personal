<script>
const MN=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
const MF=['January','February','March','April','May','June','July','August','September','October','November','December'];
const SWATCHES=['#1CC98E','#4A9EFF','#FFB547','#FF7EB3','#A78BFA','#FB923C','#FF5B5B','#60A5FA','#34D399','#F59E0B','#E879F9','#F87171'];
const EMOJIS=['🛒','🍽️','🚗','💊','🎬','🛍️','📦','🏠','⚡','📱','👤','✈️','🍕','☕','💄','🐕','📚','🎮','🏋️','🎵','🏖️','🎁','💻','🔧','👶','🧴','🌿','🍷','🎯'];
const fmt=n=>'₹'+Math.round(n).toLocaleString('en-IN');
const uid=()=>Math.random().toString(36).slice(2,9);
const today=()=>new Date().toISOString().split('T')[0];
const gCat=id=>(D.categories||[]).find(c=>c.id===id)||{n:id,i:'📌',c:'#8890AA',subs:[]};
const gSub=(catId,subId)=>(gCat(catId).subs||[]).find(s=>s.id===subId)||null;

let view='H'; // H = Household, P = Prachi, S = Shourya
let cu='P', ctab='exp', cm={y:new Date().getFullYear(),m:new Date().getMonth()};
let FB_URL='https://budgeting-9de34-default-rtdb.firebaseio.com';
let expandedCats={};

let D={
  names:{P:'Prachi',S:'Shourya'},
  inflows:{P:225000,S:382500},
  invTargets:{P:125064,S:266274},
  prepTarget:30000,
  splitRatio:{P:37,S:63},
  categories:[
    {id:'groceries',n:'Groceries',i:'🛒',c:'#1CC98E',subs:[{id:'g1',n:'Vegetables & Fruits'},{id:'g2',n:'Dairy'},{id:'g3',n:'Grocery Delivery'}]},
    {id:'food',n:'Food & Dining',i:'🍽️',c:'#4A9EFF',subs:[{id:'f1',n:'Restaurants'},{id:'f2',n:'Food Delivery'},{id:'f3',n:'Coffee & Snacks'}]},
    {id:'transport',n:'Transport',i:'🚗',c:'#FFB547',subs:[{id:'t1',n:'Cab / Auto'},{id:'t2',n:'Fuel'},{id:'t3',n:'Parking'}]},
    {id:'health',n:'Health',i:'💊',c:'#FF7EB3',subs:[{id:'h1',n:'Medicine'},{id:'h2',n:'Doctor / Lab'},{id:'h3',n:'Gym & Fitness'}]},
    {id:'entertainment',n:'Entertainment',i:'🎬',c:'#A78BFA',subs:[{id:'e1',n:'Movies & Events'},{id:'e2',n:'Hobbies'}]},
    {id:'shopping',n:'Shopping',i:'🛍️',c:'#FB923C',subs:[{id:'s1',n:'Clothes'},{id:'s2',n:'Electronics'},{id:'s3',n:'Home & Decor'}]},
    {id:'misc',n:'Miscellaneous',i:'📦',c:'#8890AA',subs:[]},
    {id:'subs',n:'Subscriptions',i:'📱',c:'#A78BFA',subs:[{id:'su1',n:'Streaming'},{id:'su2',n:'Apps & Software'}]},
    {id:'personal',n:'Personal',i:'👤',c:'#60A5FA',subs:[{id:'p1',n:'Grooming'},{id:'p2',n:'Clothing'}]},
  ],
  expenses:[],
  investments:[
    {id:'i1',n:'ELSS / Mutual Funds',p:'P',amt:65000,tgt:80000},
    {id:'i2',n:'NPS',p:'P',amt:25090,tgt:30000},
    {id:'i3',n:'SIP',p:'S',amt:150000,tgt:180000},
    {id:'i4',n:'PPF',p:'S',amt:50000,tgt:60000},
    {id:'i5',n:'Stocks',p:'S',amt:34754,tgt:26274},
    {id:'i6',n:'Home Loan Prepayment',p:'joint',amt:30000,tgt:30000},
  ],
  loans:[
    {id:'l1',n:'Home Loan',emi:45000,tenure:240,paid:36,rate:8.5,principal:8500000,p:'joint'},
    {id:'l2',n:'Car Loan',emi:12000,tenure:60,paid:24,rate:9.0,principal:500000,p:'S'},
  ],
  budgets:[
    {cat:'groceries',b:20000},{cat:'food',b:12000},{cat:'transport',b:5000},
    {cat:'health',b:5000},{cat:'entertainment',b:4000},{cat:'shopping',b:8000},{cat:'misc',b:15000},
  ],
  recurring:[
    {id:'r1',d:'Netflix',cat:'subs',amt:649,pb:'both',sp:50,ss:50},
    {id:'r2',d:'Gym (Shourya)',cat:'health',amt:2500,pb:'S',sp:0,ss:100},
    {id:'r3',d:'Spotify',cat:'subs',amt:179,pb:'both',sp:50,ss:50},
  ],
  settlements:[]
};

// ── SYNC ─────────────────────────────────────
function setSyncStatus(s,msg){
  const el=document.getElementById('syncst');if(!el)return;
  const icons={ok:'☁️',saving:'⏳',error:'⚠️',offline:'📵'};
  el.textContent=(icons[s]||'☁️')+' '+(msg||'');
  el.style.color=s==='error'?'var(--red)':s==='saving'?'var(--amber)':'var(--p)';
}
function migrate(data){
  if(data.categories)data.categories.forEach(c=>{if(!c.subs)c.subs=[];});
  // migrate recurring to new format with pb/sp/ss and from date
  if(data.recurring)data.recurring.forEach(r=>{
    if(r.pb===undefined){
      if(r.split&&r.split.includes('50'))r.pb='both',r.sp=50,r.ss=50;
      else if(r.split&&r.split.toUpperCase().includes('P'))r.pb='P',r.sp=100,r.ss=0;
      else if(r.split&&r.split.toUpperCase().includes('S'))r.pb='S',r.sp=0,r.ss=100;
      else r.pb='both',r.sp=50,r.ss=50;
    }
    if(!r.from)r.from='2020-01'; // treat old entries as always active
  });
  return data;
}
let syncTO=null;
async function save(){
  try{localStorage.setItem('psb2',JSON.stringify(D));}catch(e){}
  clearTimeout(syncTO);setSyncStatus('saving','Syncing…');
  syncTO=setTimeout(async()=>{
    try{
      const r=await fetch(FB_URL+'/psbudget.json',{method:'PUT',body:JSON.stringify({...D,_t:Date.now()}),headers:{'Content-Type':'application/json'}});
      setSyncStatus(r.ok?'ok':'error',r.ok?'Synced':'Sync failed');
    }catch(e){setSyncStatus('error','Offline');}
  },800);
}
async function load(){
  try{const v=localStorage.getItem('psb2');if(v){D=migrate(JSON.parse(v));}}catch(e){}
  try{
    setSyncStatus('saving','Loading…');
    const r=await fetch(FB_URL+'/psbudget.json');
    if(r.ok){
      const cloud=await r.json();
      if(cloud&&cloud.expenses){
        const localT=D._t||0;
        if(!localT||(cloud._t||0)>=localT){const{_t,...data}=cloud;D=migrate(data);try{localStorage.setItem('psb2',JSON.stringify(D));}catch(e){}}
      }
    }
    setSyncStatus('ok','Synced');
  }catch(e){setSyncStatus('offline','Local only');}
}
async function pullLatest(){
  setSyncStatus('saving','Refreshing…');
  try{

    if(r.ok){

      if(cloud&&cloud.expenses){

// ── COMPUTED ──────────────────────────────────
function mExps(){
  const k=cm.y+'-'+String(cm.m+1).padStart(2,'0');
  return(D.expenses||[]).filter(e=>e.date&&e.date.startsWith(k));
}
// get YYYY-MM key for a given year+month
function ymKey(y,m){return y+'-'+String(m+1).padStart(2,'0');}
// check if a recurring item is active in the current view month
function recActive(r){
  const cur=ymKey(cm.y,cm.m);
  if(r.from&&cur<r.from)return false;
  if(r.to&&cur>=r.to)return false;
  return true;
}
// recurring total for a person or household — only active items this month
function recTotal(who){
  return(D.recurring||[]).filter(recActive).reduce((a,r)=>{
    if(who==='H')return a+r.amt;
    if(who==='P')return a+r.amt*(r.sp/100);
    if(who==='S')return a+r.amt*(r.ss/100);
    return a;
  },0);
}
function stats(who='H'){
  const ex=mExps();
  const recT=recTotal(who);
  let te=0,ti=D.inflows.P+D.inflows.S,inv=0,tgt=0;
  if(who==='H'){
    te=ex.reduce((a,e)=>a+e.amt,0)+recT;
    inv=(D.investments||[]).reduce((a,i)=>a+i.amt,0);
    tgt=D.invTargets.P+D.invTargets.S+D.prepTarget;
  } else {
    const pr=who==='P'?D.splitRatio.P/100:D.splitRatio.S/100;
    te=ex.reduce((a,e)=>a+e.amt*(who==='P'?e.sp/100:e.ss/100),0)+recT;
    ti=D.inflows[who];
    inv=(D.investments||[]).filter(i=>i.p===who||(i.p==='joint'&&who==='P')).reduce((a,i)=>a+(i.p==='joint'?i.amt/2:i.amt),0);
    tgt=D.invTargets[who]+(who==='P'?D.prepTarget/2:D.prepTarget/2);
  }
  // shortfall = income - inv_target - expenses = remaining balance
  const remaining=ti-tgt-te;
  const sr=ti>0?Math.round(inv/ti*100):0;
  return{te,ti,inv,tgt,remaining,sr};
}
function sCalc(){
  const ex=mExps(),pr=D.splitRatio.P/100;
  let pF=0,sF=0,pP=0,sP=0;
  ex.forEach(e=>{
    pF+=e.amt*(e.sp/100);sF+=e.amt*(e.ss/100);
    if(e.pb==='P')pP+=e.amt;else if(e.pb==='S')sP+=e.amt;
    else{pP+=e.amt*pr;sP+=e.amt*(1-pr);}
  });
  return{pF,sF,pP,sP,net:Math.round(pP-pF)};
}
function subTotals(catId,exps){
  const t={};
  exps.filter(e=>e.cat===catId).forEach(e=>{const k=e.subcat||'__none';t[k]=(t[k]||0)+e.amt;});
  return t;
}
// last N months expense data for charts
function monthlyData(n=6){
  const months=[];
  for(let i=n-1;i>=0;i--){
    let y=cm.y,m=cm.m-i;
    while(m<0){m+=12;y--;}
    const k=y+'-'+String(m+1).padStart(2,'0');
    const exps=(D.expenses||[]).filter(e=>e.date&&e.date.startsWith(k));
    const recT=recTotal('H');
    months.push({label:MN[m],y,m,total:exps.reduce((a,e)=>a+e.amt,0)+recT,exps});
  }
  return months;
}

// ── EXPENSES RENDERER ─────────────────────────
function rExp(){
  const exps=mExps().slice().sort((a,b)=>b.date.localeCompare(a.date));

  const recTotal_all=recs.reduce((a,r)=>a+r.amt,0);

    </div>

  const recOpen=!!expandedCats['__rec'];
  if(recs.length){
    h+=`<div class="cat-row" style="margin-bottom:4px" onclick="toggleCat('__rec')">
      <span style="font-size:13px;font-weight:500;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;flex:1">🔁 Recurring · ${fmt(recSum)}</span>

      h+=`<div class="eitem" onclick="openEditRec('${r.id}')">
        <div class="eicon" style="background:${ci.c}22">${ci.i}</div>
        <div class="einfo"><div class="ename">${r.d} <span class="rec-badge">recurring</span></div><div class="emeta">${ci.n} · ${D.names.P} ${r.sp}% / ${D.names.S} ${r.ss}%</div></div>
        <div class="eright"><div class="eamt">${fmt(myAmt)}</div><div class="ewho ${wc}">${wl}</div></div>
      </div>`;
    });
    h+=`<button class="dashaddbtn" style="margin:6px 0 2px" onclick="openRecurring()">+ Add recurring</button></div></div>`;

// ── TRENDS RENDERER ───────────────────────────
function rTrends(){
  const exps=mExps(),months=monthlyData(6);
  const maxM=Math.max(...months.map(m=>m.total),1);
  const W=Math.max(340,months.length*60);

  // bar chart
  let h=`<div class="card"><div class="ctitle">Monthly Spending</div>
  <div class="chart-wrap">
  <svg width="${W}" height="140" style="display:block">`;
  const barW=Math.floor((W-40)/months.length)-8,barMaxH=90,barY=100;
  months.forEach((mo,i)=>{
    const x=20+i*(barW+8);
    const bh=mo.total>0?Math.max(4,Math.round(mo.total/maxM*barMaxH)):0;
    const isCur=mo.y===cm.y&&mo.m===cm.m;
    const clr=isCur?'#1CC98E':'#4A9EFF';
    h+=`<rect x="${x}" y="${barY-bh}" width="${barW}" height="${bh}" rx="4" fill="${clr}${isCur?'':'88'}"/>`;
    h+=`<text x="${x+barW/2}" y="${barY+14}" text-anchor="middle" font-size="10" fill="#8890AA" font-family="DM Sans,sans-serif">${mo.label}</text>`;
    if(mo.total>0)h+=`<text x="${x+barW/2}" y="${barY-bh-5}" text-anchor="middle" font-size="9" fill="${clr}" font-family="DM Mono,monospace">${Math.round(mo.total/1000)}k</text>`;
  });
  h+=`</svg></div></div>`;

  // category breakdown
  const tot={};exps.forEach(e=>{tot[e.cat]=(tot[e.cat]||0)+e.amt;});
  const sorted=Object.entries(tot).filter(([,v])=>v>0).sort((a,b)=>b[1]-a[1]),mx=sorted[0]?.[1]||1;
  h+=`<div class="card"><div class="ctitle">By Category</div>`;
  sorted.forEach(([catId,val])=>{
    const ci=gCat(catId),over=D.budgets.find(b=>b.cat===catId&&val>b.b);
    const key='t-'+catId,isOpen=!!expandedCats[key];
    const subs=ci.subs||[],st=subTotals(catId,exps);
    const hasSubs=subs.length>0||st['__none']>0;
    const labelHtml=`<div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:3px"><span style="color:var(--muted)">${ci.n}</span><span style="color:${over?'var(--red)':'inherit'}">${fmt(val)}</span></div><div class="ctrack"><div class="cbar" style="width:${Math.round(val/mx*100)}%;background:${ci.c}"></div></div>`;
    if(hasSubs){
      h+=catExpandRow(key,ci,labelHtml,isOpen);
      h+=`<div class="subcat-panel${isOpen?' open':''}" id="panel-${key}">`;
      const subEntries=subs.map(s=>({id:s.id,n:s.n,v:st[s.id]||0})).filter(x=>x.v>0).sort((a,b)=>b.v-a.v);
      if(st['__none'])subEntries.push({id:'__none',n:'Other',v:st['__none']});
      subEntries.forEach(s=>{
        const pct=Math.round(s.v/val*100);
        h+=`<div class="subcat-row"><div style="width:6px;height:6px;border-radius:50%;background:${ci.c};flex-shrink:0;margin-right:8px"></div><div style="flex:1;min-width:0"><div style="display:flex;justify-content:space-between;font-size:11px"><span style="color:var(--muted)">${s.n}</span><span>${fmt(s.v)} <span style="color:var(--muted)">${pct}%</span></span></div></div></div>`;
      });
      h+=`</div>`;
    } else {
      h+=`<div style="padding:9px 0;border-bottom:1px solid var(--border)">${labelHtml}</div>`;
    }
  });
  h+=`</div>`;

  // person fair share
  const pS=exps.reduce((a,e)=>a+e.amt*(e.sp/100),0),sS=exps.reduce((a,e)=>a+e.amt*(e.ss/100),0),t2=(pS+sS)||1;
  h+=`<div class="card"><div class="ctitle">Fair Share by Person</div>
    <div class="cbar-wrap"><div class="cbar-label"><span>🟢 ${D.names.P}</span><span>${fmt(pS)}</span></div><div class="ctrack"><div class="cbar" style="width:${Math.round(pS/t2*100)}%;background:var(--p)"></div></div></div>
    <div class="cbar-wrap"><div class="cbar-label"><span>🔵 ${D.names.S}</span><span>${fmt(sS)}</span></div><div class="ctrack"><div class="cbar" style="width:${Math.round(sS/t2*100)}%;background:var(--s)"></div></div></div>
  </div>`;

  // savings trend line chart
  const sW=Math.max(340,months.length*60);
  const balances=months.map(mo=>{
    const te=mo.exps.reduce((a,e)=>a+e.amt,0)+recTotal('H');
    const inv=(D.investments||[]).reduce((a,i)=>a+i.amt,0);
    const tgt=D.invTargets.P+D.invTargets.S+D.prepTarget;
    const ti=D.inflows.P+D.inflows.S;
    return ti-tgt-te;
  });
  const maxB=Math.max(...balances.map(Math.abs),1);
  h+=`<div class="card"><div class="ctitle">Monthly Balance Trend</div>
  <div class="chart-wrap">
  <svg width="${sW}" height="120" style="display:block">`;
  const midY=55,pts=[];
  months.forEach((mo,i)=>{
    const x=20+i*(Math.floor((sW-40)/months.length));
    const norm=balances[i]/maxB;
    const y=midY-norm*45;
    pts.push([x,y]);
  });
  // zero line
  h+=`<line x1="10" y1="${midY}" x2="${sW-10}" y2="${midY}" stroke="rgba(255,255,255,.08)" stroke-width="1"/>`;
  // line path
  if(pts.length>1){
    const pathD='M'+pts.map(p=>p.join(',')).join(' L');
    h+=`<path d="${pathD}" fill="none" stroke="#1CC98E" stroke-width="2"/>`;
  }
  pts.forEach(([x,y],i)=>{
    const clr=balances[i]>=0?'#1CC98E':'#FF5B5B';
    h+=`<circle cx="${x}" cy="${y}" r="4" fill="${clr}"/>`;
    h+=`<text x="${x}" y="112" text-anchor="middle" font-size="10" fill="#8890AA" font-family="DM Sans,sans-serif">${months[i].label}</text>`;
  });
  h+=`</svg></div></div>`;

  return h;
}

function subEditRec(id){
  const r=D.recurring.find(x=>x.id===id);if(!r)return;
  const sp=document.getElementById('rsp').value;
  const spMap={i:[D.splitRatio.P,D.splitRatio.S],'5':[50,50],P:[100,0],S:[0,100]};
  const [spP,spS]=spMap[sp]||spMap.i;
  const newAmt=parseInt(document.getElementById('ra').value)||r.amt;
  const newCat=document.getElementById('rc').value;
  const newPb=document.getElementById('rpb').value;
  const newD=document.getElementById('rd').value.trim();
  const cur=ymKey(cm.y,cm.m);
  // if amount, split or paid-by changed, close old from this month and create new
  if(newAmt!==r.amt||spP!==r.sp||newPb!==r.pb){
    r.to=cur; // close old entry: stops showing from this month
    D.recurring.push({id:'r'+uid(),d:newD||r.d,cat:newCat,amt:newAmt,pb:newPb,sp:spP,ss:spS,from:cur});
  } else {
    // only name/category changed — update in place (no financial impact)
    r.d=newD||r.d;
    r.cat=newCat;
  }
  ss();closeM();render();toast('Saved ✓');
}
function delRec(id){
  if(!confirm('Delete from this month onwards?'))return;
  const r=D.recurring.find(x=>x.id===id);if(!r)return;
  r.to=ymKey(cm.y,cm.m); // stop showing from current month onward
  ss();closeM();render();toast('Deleted from '+MN[cm.m]+' onwards');
}

function importExcel(inp){
  const file=inp.files[0];if(!file)return;
  const doImport=()=>{
    const reader=new FileReader();
    reader.onload=ev=>{
      try{
        const wb=XLSX.read(ev.target.result,{type:'array'});
        let changes=[];

        // helper: find header row index
        const findHdr=(rows,keyword)=>{for(let i=0;i<Math.min(rows.length,5);i++){if(rows[i].join('').toLowerCase().includes(keyword))return i;}return -1;};
        const n2k={[D.names.P.toLowerCase()]:'P',[D.names.S.toLowerCase()]:'S','both':'both','prachi':'P','shourya':'S','joint':'joint'};
        const pN2k={[D.names.P.toLowerCase()]:'P',[D.names.S.toLowerCase()]:'S','prachi':'P','shourya':'S'};

        // ── 1. Settings ────────────────────────────────────────
        const wsSett=wb.Sheets['Settings'];
        if(wsSett){
          const rows=XLSX.utils.sheet_to_json(wsSett,{header:1,defval:''});
          const hdr=findHdr(rows,'field');
          const dataRows=hdr>=0?rows.slice(hdr+1):rows;
          const map={};
          dataRows.forEach(r=>{
            const k=String(r[0]||'').trim().toLowerCase();
            const v=String(r[1]||'').trim();
            if(k&&v)map[k]=v;
          });
          const get=(k,def)=>map[k.toLowerCase()]??def;
          const p1name=get('person 1 name',D.names.P);
          const p2name=get('person 2 name',D.names.S);
          const p1inc=parseInt(get('person 1 monthly income',D.inflows.P))||D.inflows.P;
          const p2inc=parseInt(get('person 2 monthly income',D.inflows.S))||D.inflows.S;
          const p1split=parseInt(get('person 1 split %',D.splitRatio.P))||D.splitRatio.P;
          const p2split=parseInt(get('person 2 split %',D.splitRatio.S))||D.splitRatio.S;
          const p1tgt=parseInt(get('person 1 investment target',D.invTargets.P))||D.invTargets.P;
          const p2tgt=parseInt(get('person 2 investment target',D.invTargets.S))||D.invTargets.S;
          const prep=parseInt(get('loan prepayment target',D.prepTarget))||D.prepTarget;
          D.names.P=p1name;D.names.S=p2name;
          D.inflows.P=p1inc;D.inflows.S=p2inc;
          D.splitRatio.P=p1split;D.splitRatio.S=p2split;
          D.invTargets.P=p1tgt;D.invTargets.S=p2tgt;
          D.prepTarget=prep;
          changes.push('settings');
          // rebuild nameToKey after name update
          n2k[p1name.toLowerCase()]='P';n2k[p2name.toLowerCase()]='S';
          pN2k[p1name.toLowerCase()]='P';pN2k[p2name.toLowerCase()]='S';
        }

        // ── 2. Budgets ─────────────────────────────────────────
        const wsBud=wb.Sheets['Budgets'];
        if(wsBud){
          const rows=XLSX.utils.sheet_to_json(wsBud,{header:1,defval:''});
          const hdr=findHdr(rows,'category');
          if(hdr>=0){
            rows.slice(hdr+1).forEach(row=>{
              const catName=String(row[0]||'').trim().toLowerCase();
              const amt=parseInt(String(row[1]||'0').replace(/[₹,]/g,''));
              if(!catName||!amt)return;
              const cat=(D.categories||[]).find(c=>c.n.toLowerCase()===catName);
              if(cat){const b=D.budgets.find(b=>b.cat===cat.id);if(b)b.b=amt;else D.budgets.push({cat:cat.id,b:amt});}
            });
            changes.push('budgets');
          }
        }

        // ── 3. Investments ─────────────────────────────────────
        const wsInv=wb.Sheets['Investments'];
        if(wsInv){
          const rows=XLSX.utils.sheet_to_json(wsInv,{header:1,defval:''});
          const hdr=findHdr(rows,'name');
          if(hdr>=0){
            const hdrs=rows[hdr].map(h=>String(h).toLowerCase());
            const ci={id:hdrs.indexOf('id'),n:hdrs.findIndex(h=>h.includes('name')),p:hdrs.findIndex(h=>h.includes('person')),amt:hdrs.findIndex(h=>h.includes('amount')||h.includes('invested')),tgt:hdrs.findIndex(h=>h.includes('target'))};
            rows.slice(hdr+1).forEach(row=>{
              const name=String(row[ci.n]||'').trim();
              const amt=parseFloat(String(row[ci.amt]||'0').replace(/[₹,]/g,''));
              if(!name||amt===0&&!row[ci.id])return;
              const existId=String(row[ci.id]||'').trim();
              const tgt=parseFloat(String(row[ci.tgt]||'0').replace(/[₹,]/g,''))||0;
              const pRaw=String(row[ci.p]||'').trim().toLowerCase();
              const p=pN2k[pRaw]||'joint';
              if(existId){
                const inv=(D.investments||[]).find(i=>i.id===existId);
                if(inv){inv.n=name||inv.n;inv.amt=isNaN(amt)?inv.amt:amt;inv.tgt=tgt||inv.tgt;inv.p=p||inv.p;}
              } else if(name&&!isNaN(amt)&&amt>0){
                D.investments.push({id:'i'+uid(),n:name,p,amt,tgt});
              }
            });
            changes.push('investments');
          }
        }

        // ── 4. Loans ───────────────────────────────────────────
        const wsLoan=wb.Sheets['Loans'];
        if(wsLoan){
          const rows=XLSX.utils.sheet_to_json(wsLoan,{header:1,defval:''});
          const hdr=findHdr(rows,'loan name');
          if(hdr>=0){
            const hdrs=rows[hdr].map(h=>String(h).toLowerCase());
            const ci={id:hdrs.indexOf('id'),n:hdrs.findIndex(h=>h.includes('name')),p:hdrs.findIndex(h=>h.includes('owner')),emi:hdrs.findIndex(h=>h.includes('emi')||h.includes('month')),rate:hdrs.findIndex(h=>h.includes('rate')||h.includes('interest')),tenure:hdrs.findIndex(h=>h.includes('tenure')),paid:hdrs.findIndex(h=>h.includes('paid')),prin:hdrs.findIndex(h=>h.includes('principal'))};
            rows.slice(hdr+1).forEach(row=>{
              const name=String(row[ci.n]||'').trim();
              const emi=parseFloat(String(row[ci.emi]||'0').replace(/[₹,]/g,''));
              if(!name||!emi)return;
              const existId=String(row[ci.id]||'').trim();
              const pRaw=String(row[ci.p]||'joint').trim().toLowerCase();
              const p=n2k[pRaw]||'joint';
              const rate=parseFloat(row[ci.rate])||0;
              const tenure=parseInt(row[ci.tenure])||0;
              const paid=parseInt(row[ci.paid])||0;
              const principal=parseFloat(String(row[ci.prin]||'0').replace(/[₹,]/g,''))||0;
              if(existId){
                const l=(D.loans||[]).find(l=>l.id===existId);
                if(l){l.n=name||l.n;l.emi=emi||l.emi;l.rate=rate||l.rate;l.tenure=tenure||l.tenure;l.paid=paid;l.principal=principal||l.principal;l.p=p;}
              } else if(name&&emi>0){
                D.loans.push({id:'l'+uid(),n:name,emi,rate,tenure,paid,principal,p});
              }
            });
            changes.push('loans');
          }
        }

        // ── 5. Categories ──────────────────────────────────────
        let addedCat=0,addedSub=0;
        const wsCat=wb.Sheets['Categories'];
        if(wsCat){
          const rows=XLSX.utils.sheet_to_json(wsCat,{header:1,defval:''});
          const hdr=findHdr(rows,'category name');
          if(hdr>=0){
            rows.slice(hdr+1).forEach(row=>{
              const catName=String(row[0]||'').trim();
              if(!catName||catName.toLowerCase().startsWith('new category'))return;
              const icon=String(row[1]||'📦').trim()||'📦';
              const color=String(row[2]||'#8890AA').trim()||'#8890AA';
              const subNames=row.slice(3).map(s=>String(s||'').trim()).filter(Boolean);
              let cat=(D.categories||[]).find(c=>c.n.toLowerCase()===catName.toLowerCase());
              if(!cat){
                const id='c'+uid();cat={id,n:catName,i:icon,c:color,subs:[]};
                D.categories.push(cat);D.budgets.push({cat:id,b:5000});addedCat++;
              } else {cat.i=icon;cat.c=color;}
              subNames.forEach(sn=>{
                if(!(cat.subs||[]).find(s=>s.n.toLowerCase()===sn.toLowerCase())){
                  if(!cat.subs)cat.subs=[];cat.subs.push({id:'s'+uid(),n:sn});addedSub++;
                }
              });
            });
          }
        }
        if(addedCat||addedSub)changes.push(`${addedCat} cats, ${addedSub} subcats`);

        // rebuild catMap after category changes
        const catMap={};
        (D.categories||[]).forEach(c=>{
          catMap[c.n.toLowerCase()]=c.id;
          (c.subs||[]).forEach(s=>{catMap[c.id+'::'+s.n.toLowerCase()]=s.id;});
        });

        // ── 6. Expenses ────────────────────────────────────────
        let addedExp=0,skippedExp=0;
        const wsE=wb.Sheets['Expenses'];
        const existingIds=new Set((D.expenses||[]).map(e=>e.id));
        if(wsE){
          const rows=XLSX.utils.sheet_to_json(wsE,{header:1,defval:''});
          const hdr=findHdr(rows,'description');
          if(hdr>=0){
            const hdrs=rows[hdr].map(h=>String(h).toLowerCase().trim());
            const ci={id:hdrs.indexOf('id'),date:hdrs.findIndex(h=>h.includes('date')),desc:hdrs.findIndex(h=>h.includes('description')),cat:hdrs.findIndex(h=>h.includes('category')&&!h.includes('sub')),subcat:hdrs.findIndex(h=>h.includes('sub')),amt:hdrs.findIndex(h=>h.includes('amount')),pb:hdrs.findIndex(h=>h.includes('paid')),sp:hdrs.findIndex(h=>h.includes('p split')||h==='p%'),ss:hdrs.findIndex(h=>h.includes('s split')||h==='s%')};
            rows.slice(hdr+1).forEach(row=>{
              const desc=String(row[ci.desc]||'').trim();
              const dateRaw=String(row[ci.date]||'').trim();
              const amtRaw=parseFloat(String(row[ci.amt]||'0').replace(/[₹,]/g,''));
              if(!desc||!dateRaw||!amtRaw)return;
              let dateStr=dateRaw;
              if(/^\d+$/.test(dateRaw)){const d=XLSX.SSF.parse_date_code(parseInt(dateRaw));dateStr=`${d.y}-${String(d.m).padStart(2,'0')}-${String(d.d).padStart(2,'0')}`;}
              const existId=String(row[ci.id]||'').trim();
              if(existId&&existingIds.has(existId)){skippedExp++;return;}
              const catId=catMap[String(row[ci.cat]||'').trim().toLowerCase()]||(D.categories[0]?.id||'misc');
              const subId=catMap[catId+'::'+String(row[ci.subcat]||'').trim().toLowerCase()]||'';
              const pb=n2k[String(row[ci.pb]||'both').trim().toLowerCase()]||'both';
              const sp=ci.sp>=0?Math.min(100,Math.max(0,parseInt(row[ci.sp])||0)):D.splitRatio.P;
              const ss=ci.ss>=0?Math.min(100,Math.max(0,parseInt(row[ci.ss])||0)):D.splitRatio.S;
              const exp={id:'e'+uid(),d:desc,cat:catId,amt:amtRaw,pb,date:dateStr,sp,ss,by:'P'};
              if(subId)exp.subcat=subId;
              D.expenses.push(exp);existingIds.add(exp.id);addedExp++;
            });
          }
        }
        if(addedExp||skippedExp)changes.push(`${addedExp} expenses (+${skippedExp} skipped)`);

        // ── 7. Recurring ───────────────────────────────────────
        let addedRec=0;
        const wsRec=wb.Sheets['Recurring'];
        const existRecIds=new Set((D.recurring||[]).map(r=>r.id));
        if(wsRec){
          const rows=XLSX.utils.sheet_to_json(wsRec,{header:1,defval:''});
          const hdr=findHdr(rows,'description');
          if(hdr>=0){
            const hdrs=rows[hdr].map(h=>String(h).toLowerCase().trim());
            const ci={id:hdrs.indexOf('id'),desc:hdrs.findIndex(h=>h.includes('description')),cat:hdrs.findIndex(h=>h.includes('category')),amt:hdrs.findIndex(h=>h.includes('amount')),pb:hdrs.findIndex(h=>h.includes('paid')),sp:hdrs.findIndex(h=>h.includes('p split')),ss:hdrs.findIndex(h=>h.includes('s split')),from:hdrs.findIndex(h=>h.includes('from'))};
            rows.slice(hdr+1).forEach(row=>{
              const desc=String(row[ci.desc]||'').trim();
              const amt=parseFloat(String(row[ci.amt]||'0').replace(/[₹,]/g,''));
              if(!desc||!amt)return;
              const existId=String(row[ci.id]||'').trim();
              if(existId&&existRecIds.has(existId))return;
              const catId=catMap[String(row[ci.cat]||'').trim().toLowerCase()]||(D.categories[0]?.id||'misc');
              const pb=n2k[String(row[ci.pb]||'both').trim().toLowerCase()]||'both';
              const sp=ci.sp>=0?parseInt(row[ci.sp])||50:50;
              const ss=ci.ss>=0?parseInt(row[ci.ss])||50:50;
              const from=String(row[ci.from]||ymKey(cm.y,cm.m)).trim()||ymKey(cm.y,cm.m);
              D.recurring.push({id:'r'+uid(),d:desc,cat:catId,amt,pb,sp,ss,from});addedRec++;
            });
          }
        }
        if(addedRec)changes.push(`${addedRec} recurring`);

        if(!changes.length){toast('No changes found in file');inp.value='';return;}
        ss();render();
        toast('Updated: '+changes.join(' · ')+' ✓');
      }catch(err){console.error(err);toast('Could not read Excel file');}
      inp.value='';
    };
    reader.readAsArrayBuffer(file);
  };
  if(window.XLSX){doImport();}
  else{
    const s=document.createElement('script');
    s.src='https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js';
    s.onload=doImport;
    s.onerror=()=>toast('Could not load Excel library');
    document.head.appendChild(s);
  }
}
function chMonth(d){cm.m+=d;if(cm.m>11){cm.m=0;cm.y++;}if(cm.m<0){cm.m=11;cm.y--;}render();}
let tT;function toast(msg){const el=document.getElementById('toast');el.textContent=msg;el.style.display='block';clearTimeout(tT);tT=setTimeout(()=>el.style.display='none',2200);}
function ss(){save();}

// ── INIT ─────────────────────────────────────
(async()=>{
  if('serviceWorker' in navigator){navigator.serviceWorker.register('sw.js').catch(()=>{});}
  await load();
  setView('H');
})();
</script>
